# Reusable workflow: build + deploy to rfcx-local cluster
#
# Called from each rfcx-org repo's `cd.yaml` alongside the existing AWS
# deploy job. Runs on our self-hosted runner inside the rfcx-local
# cluster (label: `rfcx-local-deployment-runner`).
#
# Two stages:
#   1. build (matrix over `targets`)    — buildx each Dockerfile stage and push to local registry
#   2. deploy (matrix over `deployments`) — for each apps-prod deployment, kubectl set-image to the
#                                            newly-built tag of its source image
#
# `deployments` is a JSON array of `{"name": "<apps-prod deployment>", "image": "<target stage>"}` so a
# single image stage can be deployed to multiple apps-prod deployments (e.g., core-api → core-api + media-api).
#
# Usage in caller's cd.yaml:
#
#   deploy-rfcx-local:
#     needs: [prepare, configure]
#     if: ${{ needs.configure.outputs.namespace == 'production' }}
#     uses: rfcx/cicd/.github/workflows/rfcx-local-cd.yaml@master
#     with:
#       dockerfile: build/Dockerfile
#       targets: '["core-api","core-tasks","noncore-api","noncore-mqtt"]'
#       deployments: |
#         [
#           {"name": "core-api",     "image": "core-api"},
#           {"name": "core-tasks",   "image": "core-tasks"},
#           {"name": "noncore-api",  "image": "noncore-api"},
#           {"name": "noncore-mqtt", "image": "noncore-mqtt"},
#           {"name": "media-api",    "image": "core-api"}
#         ]
#       repo: rfcx-api

name: 'rfcx-local CD (reusable)'

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Path to Dockerfile within the source repo'
        required: false
        type: string
        default: 'build/Dockerfile'
      targets:
        description: 'JSON array of Dockerfile target stages to build'
        required: true
        type: string
      deployments:
        description: 'JSON array of {name, image} for apps-prod deployments to roll out'
        required: false
        type: string
        default: '[]'
      repo:
        description: 'Repo name (for log messages)'
        required: true
        type: string
      rollout-timeout:
        description: |
          Per-deployment rollout-status timeout, in seconds. Each
          deployment in `deployments` is waited on for up to this
          long via `kubectl rollout status`. Defaults to 600s (10min)
          which covers most apps-prod Deployments with rolling-update
          maxSurge=1 (~3 min per replica) on slow-start images.
          Bump for unusually heavy services; lower for synthetic tests.
        required: false
        type: number
        default: 600

jobs:
  build:
    name: 'rfcx-local build: ${{ matrix.target }}'
    runs-on: rfcx-local-deployment-runner
    strategy:
      matrix:
        target: ${{ fromJson(inputs.targets) }}
      fail-fast: false
    env:
      # Push to the in-cluster HA registry by its STABLE cluster DNS Service name,
      # NOT the 192.168.5.1:30500 host-gateway alias (buildx's docker-container
      # driver does not honor the k3s containerd registry mirror, so the build job
      # must target a real registry address itself).
      #
      # The CD runner (ns cicd, on tier=build) runs in the cluster, and its dind
      # build environment resolves cluster DNS + reaches the registry ClusterIP
      # (verified 2026-06-29 with a real buildx push using the SAME default
      # docker-container driver this workflow uses). registry.data.svc =
      # the `registry` Service (ClusterIP, port 5000) -> kube-proxy load-balances
      # across the 3 registry-ha replicas and AUTOMATICALLY excludes any down
      # replica, so there is NO single-node SPOF. sessionAffinity:ClientIP on that
      # Service (data-stores/registry/registry-service.yaml) keeps all chunks of
      # one push on one replica (else docker/distribution's stateful chunked blob
      # upload across replicas -> `blob upload invalid`). All replicas share one
      # distributed-MinIO backend, so the push is immediately visible to the
      # kubelet pull (which resolves the unchanged image ref 192.168.5.1:30500 to
      # the same .2.x registry nodes via registries.yaml; verified crictl-pullable).
      #
      # History: was 192.168.64.21:30500 (RETIRED platform-a node -> i/o timeout),
      # then briefly the single node 192.168.2.200:30500 (worked but a 1-node SPOF);
      # moved to the Service DNS for HA on 2026-06-29.
      REGISTRY: registry.data.svc.cluster.local:5000
    outputs:
      unique-tag: ${{ steps.meta.outputs.unique-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: 'Setup: docker buildx'
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [registry."registry.data.svc.cluster.local:5000"]
              http = true
              insecure = true

      - name: 'Meta: compute tag'
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          UNIQUE_TAG="rfcx-local-prod-${SHORT_SHA}"
          echo "unique-tag=${UNIQUE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Building ${{ matrix.target }} as ${UNIQUE_TAG}..."

      - name: 'Build + push'
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/arm64 \
            --file "${{ inputs.dockerfile }}" \
            --target "${{ matrix.target }}" \
            --tag "${REGISTRY}/${{ matrix.target }}:${{ steps.meta.outputs.unique-tag }}" \
            --tag "${REGISTRY}/${{ matrix.target }}:native-arm64-latest" \
            --tag "${REGISTRY}/${{ matrix.target }}:rfcx-local-prod-latest" \
            --output type=registry,registry.insecure=true \
            .

  deploy:
    name: 'rfcx-local deploy: ${{ matrix.entry.name }}'
    needs: [build]
    if: ${{ inputs.deployments != '[]' && inputs.deployments != '' }}
    runs-on: rfcx-local-deployment-runner
    strategy:
      matrix:
        entry: ${{ fromJson(inputs.deployments) }}
      fail-fast: false
    env:
      # set image references the 192.168.5.1:30500 host-gateway alias (consistent with
      # the apps-prod/*.yaml repo manifests); the kubelet's k3s containerd mirror
      # (bootstrap/k3s-agent-configs/registries.yaml) resolves 192.168.5.1:30500 ->
      # the HA registry nodes 192.168.2.199/200/201:30500, the same shared backend
      # the build job pushed to via registry.data.svc above, so the pull succeeds.
      # Image REFERENCES intentionally stay on the .5.1 alias (it is what the
      # NODES' containerd mirror knows; cluster DNS like registry.data.svc is NOT
      # resolvable from a node's containerd, only from inside the pod network where
      # the build job runs). Only the build-PUSH target uses the Service DNS.
      REGISTRY: 192.168.5.1:30500
      NAMESPACE: apps-prod
      ROLLOUT_TIMEOUT: ${{ inputs.rollout-timeout }}
    steps:
      - name: 'kubectl set image'
        run: |
          set -euo pipefail
          DEPLOY_NAME="${{ matrix.entry.name }}"
          IMAGE_NAME="${{ matrix.entry.image }}"
          UNIQUE_TAG="${{ needs.build.outputs.unique-tag }}"
          CONTAINER_NAME=$(kubectl -n "${NAMESPACE}" get deploy "${DEPLOY_NAME}" \
            -o jsonpath='{.spec.template.spec.containers[0].name}')
          echo "Setting image for ${DEPLOY_NAME}/${CONTAINER_NAME} -> ${REGISTRY}/${IMAGE_NAME}:${UNIQUE_TAG}"
          kubectl -n "${NAMESPACE}" set image "deployment/${DEPLOY_NAME}" \
            "${CONTAINER_NAME}=${REGISTRY}/${IMAGE_NAME}:${UNIQUE_TAG}"
          echo "Waiting for rollout (timeout ${ROLLOUT_TIMEOUT}s)..."
          kubectl -n "${NAMESPACE}" rollout status "deployment/${DEPLOY_NAME}" --timeout="${ROLLOUT_TIMEOUT}s"
          echo "::notice title=rfcx-local::${{ inputs.repo }}/${DEPLOY_NAME} rolled out to ${UNIQUE_TAG}"